<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title th:text="${coin.name} + ' — CryptoFin'">Coin — CryptoFin</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-warning" th:href="@{/}"><i class="bi bi-currency-bitcoin"></i> CryptoFin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/crypto}"><i class="bi bi-coin"></i> Crypto</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/currencies}"><i class="bi bi-cash-coin"></i> Currencies</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/portfolio}"><i class="bi bi-briefcase"></i> Portfolio</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container-fluid py-4 px-4">
    <a th:href="@{/crypto}" class="btn btn-outline-secondary btn-sm mb-3">
        <i class="bi bi-arrow-left"></i> Back
    </a>

    <!-- Header -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <img th:src="${coin.imageUrl}" class="coin-img-lg" th:alt="${coin.name}"/>
        <div>
            <h3 class="mb-0 fw-bold" th:text="${coin.name}">Bitcoin</h3>
            <span class="badge bg-secondary fs-6" th:text="${coin.symbol}">BTC</span>
        </div>
        <div class="ms-auto text-end">
            <div class="fs-2 fw-bold text-warning"
                 th:text="'$' + ${#numbers.formatDecimal(coin.priceUsd ?: 0, 1, 4)}">$0</div>
            <span th:classappend="${(coin.priceChangePercent24h ?: 0) >= 0} ? 'badge-positive' : 'badge-negative'"
                  class="badge-change fs-6"
                  th:text="${(coin.priceChangePercent24h ?: 0) >= 0 ? '+' : ''} + ${#numbers.formatDecimal(coin.priceChangePercent24h ?: 0, 1, 2)} + '% (24h)'">0%</span>
        </div>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="text-muted small">Market Cap</div>
                <div class="stat-value text-light"
                     th:text="'$' + ${#numbers.formatDecimal((coin.marketCap ?: 0) / 1000000000, 1, 2)} + 'B'">$0B</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="text-muted small">Volume 24h</div>
                <div class="stat-value text-light"
                     th:text="'$' + ${#numbers.formatDecimal((coin.volume24h ?: 0) / 1000000, 1, 0)} + 'M'">$0M</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="text-muted small">CoinGecko ID</div>
                <div class="stat-value text-info fs-5" th:text="${coin.coingeckoId}">bitcoin</div>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="card-dark p-3">
        <h6 class="text-muted mb-3"><i class="bi bi-graph-up-arrow"></i> Price History</h6>
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    const coinId = [[${coin.id}]];
    fetch(`/crypto/${coinId}/history?points=48`)
        .then(r => r.json())
        .then(data => {
            const labels = data.map(p => new Date(p.timestamp).toLocaleString('uk-UA', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}));
            const prices = data.map(p => p.priceUsd);
            const isUp = prices.length > 1 && prices[0] <= prices[prices.length - 1];
            new Chart(document.getElementById('priceChart'), {
                type: 'line',
                data: {
                    labels: labels.reverse(),
                    datasets: [{
                        label: 'Price USD',
                        data: prices.reverse(),
                        borderColor: isUp ? '#22c55e' : '#ef4444',
                        backgroundColor: isUp ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#666', maxTicksLimit: 8 }, grid: { color: '#2d2d44' } },
                        y: { ticks: { color: '#aaa', callback: v => '$' + v.toLocaleString() }, grid: { color: '#2d2d44' } }
                    }
                }
            });
        });
</script>
</body>
</html>
