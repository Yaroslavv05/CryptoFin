<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Portfolio — CryptoFin</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-warning" th:href="@{/}"><i class="bi bi-currency-bitcoin"></i> CryptoFin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/crypto}"><i class="bi bi-coin"></i> Crypto</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/currencies}"><i class="bi bi-cash-coin"></i> Currencies</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/portfolio}"><i class="bi bi-briefcase"></i> Portfolio</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="text-warning mb-0"><i class="bi bi-briefcase"></i> My Portfolios</h4>
        <button class="btn btn-accent" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="bi bi-plus-lg"></i> New Portfolio
        </button>
    </div>

    <div th:if="${portfolios.isEmpty()}" class="text-center text-muted py-5">
        <i class="bi bi-briefcase fs-1 opacity-25"></i>
        <p class="mt-3">No portfolios yet. Create your first one!</p>
    </div>

    <div class="row g-3">
        <div th:each="p : ${portfolios}" class="col-md-4">
            <div class="portfolio-card p-4">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h5 class="fw-bold mb-1" th:text="${p.name}">Portfolio</h5>
                        <p class="text-muted small mb-2" th:text="${p.description ?: 'No description'}">desc</p>
                    </div>
                    <form th:action="@{/portfolio/{id}/delete(id=${p.id})}" method="post"
                          onsubmit="return confirm('Delete this portfolio?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger border-0">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </div>

                <div class="row g-2 my-2">
                    <div class="col-6">
                        <div class="text-muted small">Invested</div>
                        <div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(p.totalInvestedUsd, 1, 2)}">$0</div>
                    </div>
                    <div class="col-6">
                        <div class="text-muted small">Current</div>
                        <div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(p.totalCurrentUsd, 1, 2)}">$0</div>
                    </div>
                    <div class="col-12">
                        <div class="text-muted small">P&amp;L</div>
                        <div th:classappend="${p.profitLossUsd >= 0} ? 'text-positive' : 'text-negative'" class="fw-bold">
                            <span th:text="${p.profitLossUsd >= 0 ? '+' : ''} + '$' + ${#numbers.formatDecimal(p.profitLossUsd, 1, 2)}">$0</span>
                            <span class="small ms-1"
                                  th:text="'(' + ${p.profitLossPercent >= 0 ? '+' : ''} + ${#numbers.formatDecimal(p.profitLossPercent, 1, 2)} + '%)'">
                            </span>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <a th:href="@{/portfolio/{id}(id=${p.id})}" class="btn btn-sm btn-outline-warning flex-grow-1">
                        <i class="bi bi-eye"></i> View
                    </a>
                    <a th:href="@{/portfolio/{id}/edit(id=${p.id})}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-pencil"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Create Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark border border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title text-warning"><i class="bi bi-plus-circle"></i> New Portfolio</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/portfolio}" method="post" th:object="${form}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-muted">Name *</label>
                        <input type="text" th:field="*{name}" class="form-control search-input" placeholder="e.g. Long Term"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Description</label>
                        <textarea th:field="*{description}" class="form-control search-input" rows="2"
                                  placeholder="Optional description"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-accent">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
