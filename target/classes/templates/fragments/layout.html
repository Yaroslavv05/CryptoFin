<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title} ?: 'CryptoFin'">CryptoFin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-warning" th:href="@{/}">
            <i class="bi bi-currency-bitcoin"></i> CryptoFin
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/crypto}" th:classappend="${activePage == 'crypto'} ? 'active' : ''">
                        <i class="bi bi-coin"></i> Crypto
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/currencies}" th:classappend="${activePage == 'currencies'} ? 'active' : ''">
                        <i class="bi bi-cash-coin"></i> Currencies
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/portfolio}" th:classappend="${activePage == 'portfolio'} ? 'active' : ''">
                        <i class="bi bi-briefcase"></i> Portfolio
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container-fluid py-4 px-4">
    <th:block th:replace="${content}"/>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</body>
</html>
