<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Currencies — CryptoFin</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-warning" th:href="@{/}"><i class="bi bi-currency-bitcoin"></i> CryptoFin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/crypto}"><i class="bi bi-coin"></i> Crypto</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/currencies}"><i class="bi bi-cash-coin"></i> Currencies</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/portfolio}"><i class="bi bi-briefcase"></i> Portfolio</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container-fluid py-4 px-4">
    <h4 class="text-info mb-4"><i class="bi bi-cash-stack"></i> Exchange Rates to UAH</h4>

    <div class="row g-3 mb-4">
        <div th:each="cur : ${currencies}" class="col-md-3 col-sm-6">
            <div class="card-dark p-3 h-100" style="cursor:pointer"
                 th:data-id="${cur.id}" th:data-code="${cur.code}"
                 onclick="loadChart(this.dataset.id, this.dataset.code)">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="fw-bold fs-5" th:text="${cur.code}">USD</div>
                        <div class="text-muted small" th:text="${cur.name}">US Dollar</div>
                    </div>
                    <i class="bi bi-bar-chart-line text-info opacity-50 fs-4"></i>
                </div>
                <div class="mt-2">
                    <span class="fs-4 fw-bold text-light"
                          th:text="${#numbers.formatDecimal(cur.rateUah ?: 0, 1, 4)}">0</span>
                    <span class="text-muted ms-1">UAH</span>
                </div>
                <div class="text-muted small mt-1"
                     th:text="${cur.rateDate != null ? 'Updated: ' + cur.rateDate : 'No data'}">Updated</div>
            </div>
        </div>
    </div>

    <!-- Chart area -->
    <div class="card-dark p-4" id="chartArea" style="display:none">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="text-info mb-0"><i class="bi bi-graph-up"></i> Rate History: <span id="chartTitle"></span></h6>
            <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('chartArea').style.display='none'">
                <i class="bi bi-x"></i> Close
            </button>
        </div>
        <div class="chart-container">
            <canvas id="rateChart"></canvas>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script>
    let chartInstance = null;
    function loadChart(currencyId, code) {
        fetch(`/currencies/${currencyId}/history?days=30`)
            .then(r => r.json())
            .then(data => {
                document.getElementById('chartArea').style.display = 'block';
                document.getElementById('chartTitle').textContent = code + ' / UAH (30 days)';
                const labels = data.map(r => r.rateDate).reverse();
                const rates  = data.map(r => r.rateUah).reverse();
                if (chartInstance) chartInstance.destroy();
                chartInstance = new Chart(document.getElementById('rateChart'), {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: code + ' / UAH',
                            data: rates,
                            borderColor: '#38bdf8',
                            backgroundColor: 'rgba(56,189,248,0.08)',
                            borderWidth: 2,
                            pointRadius: 3,
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { color: '#666' }, grid: { color: '#2d2d44' } },
                            y: { ticks: { color: '#aaa', callback: v => v.toFixed(2) + ' ₴' }, grid: { color: '#2d2d44' } }
                        }
                    }
                });
                document.getElementById('chartArea').scrollIntoView({ behavior: 'smooth' });
            });
    }
</script>
</body>
</html>
