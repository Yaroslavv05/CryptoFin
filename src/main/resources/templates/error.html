<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Error — CryptoFin</title>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="bg-dark text-light">
<div class="container py-5">
    <div class="card-dark p-4">
        <h3 class="text-danger"><i class="bi bi-exclamation-triangle"></i> Error</h3>
        <p class="text-muted" th:text="${errorClass}">Exception</p>
        <pre class="text-warning" th:text="${errorMessage}">message</pre>
        <a href="/" class="btn btn-outline-secondary mt-3">Back to Dashboard</a>
    </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</body>
</html>
