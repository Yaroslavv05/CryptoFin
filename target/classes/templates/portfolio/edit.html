<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Edit Portfolio — CryptoFin</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-warning" th:href="@{/}"><i class="bi bi-currency-bitcoin"></i> CryptoFin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/crypto}"><i class="bi bi-coin"></i> Crypto</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/currencies}"><i class="bi bi-cash-coin"></i> Currencies</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/portfolio}"><i class="bi bi-briefcase"></i> Portfolio</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-dark p-4">
                <div class="d-flex align-items-center gap-2 mb-4">
                    <a th:href="@{/portfolio/{id}(id=${portfolio.id})}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h5 class="mb-0 text-warning"><i class="bi bi-pencil"></i> Edit Portfolio</h5>
                </div>

                <form th:action="@{/portfolio/{id}/edit(id=${portfolio.id})}" method="post" th:object="${form}">
                    <div class="mb-3">
                        <label class="form-label text-muted">Name *</label>
                        <input type="text" th:field="*{name}" class="form-control search-input"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Description</label>
                        <textarea th:field="*{description}" class="form-control search-input" rows="3"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-accent flex-grow-1">
                            <i class="bi bi-check-lg"></i> Save
                        </button>
                        <a th:href="@{/portfolio/{id}(id=${portfolio.id})}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
